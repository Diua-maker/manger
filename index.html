<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MesadaControl</title>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --danger: #f43f5e;
            --danger-light: #ffe4e6;
            --success: #10b981;
            --info: #3b82f6;
            --info-light: #dbeafe;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 1.5rem;
            --radius-sm: 0.75rem;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --font-sans: system-ui, -apple-system, sans-serif;
        }

        /* Emoji Icons Utility */
        .icon { font-style: normal; line-height: 1; display: inline-block; vertical-align: middle; text-align: center; font-size: 1.25rem; }
        .icon-lg { font-size: 1.75rem; }
        .icon-xl { font-size: 2.25rem; }
        .icon-3xl { font-size: 6rem; }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html { height: 100%; }
        body { font-family: var(--font-sans); background-color: var(--bg); color: var(--text-main); height: 100vh; overflow: hidden; }
        
        /* --- UTILITIES --- */
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .justify-center { justify-content: center; }
        .gap-1 { gap: 0.25rem; }
        .gap-2 { gap: 0.5rem; }
        .gap-4 { gap: 1rem; }
        .p-4 { padding: 1rem; }
        .p-6 { padding: 1.5rem; }
        .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
        .px-4 { padding-left: 1rem; padding-right: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }
        .mb-6 { margin-bottom: 1.5rem; }
        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .text-sm { font-size: 0.875rem; }
        .text-xs { font-size: 0.75rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }
        .text-center { text-align: center; }
        .text-white { color: white; }
        .text-primary { color: var(--primary); }
        .text-danger { color: var(--danger); }
        .text-info { color: var(--info); }
        .text-muted { color: var(--text-muted); }
        .bg-white { background-color: white; }
        .bg-primary { background-color: var(--primary); }
        .w-full { width: 100%; }
        .h-full { height: 100%; }
        .rounded-full { border-radius: 9999px; }
        .shadow { box-shadow: var(--shadow); }
        .relative { position: relative; }
        .absolute { position: absolute; }
        .fixed { position: fixed; }
        .inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
        .z-50 { z-index: 50; }
        .overflow-hidden { overflow: hidden; }
        .overflow-y-auto { overflow-y: auto; }

        /* --- COMPONENTS --- */
        #app { max-width: 480px; margin: 0 auto; height: 100dvh; position: relative; background: var(--bg); display: flex; flex-direction: column; }
        
        /* Main Content Area */
        #main-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 90px; scroll-behavior: smooth; }
        
        /* Cards */
        .card { background: var(--card-bg); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow); border: 1px solid var(--border); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        
        /* Balance Card */
        .balance-card { background: var(--primary); color: white; border-radius: var(--radius); padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3); }
        .balance-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-top: 1.5rem; }
        .stat-box { background: rgba(255,255,255,0.2); border-radius: var(--radius-sm); padding: 0.75rem; backdrop-filter: blur(4px); }
        
        /* Navigation */
        .nav-bar { 
            position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px;
            background: white; border-top: 1px solid var(--border); 
            display: flex; justify-content: space-around; padding: 0.75rem 0;
            z-index: 40; padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.05);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); background: none; border: none; font-size: 0.7rem; font-weight: 600; cursor: pointer; width: 100%; }
        .nav-item.active { color: var(--primary); }
        .nav-icon { font-size: 1.25rem; line-height: 1; margin-bottom: 2px; }

        /* Buttons */
        .btn { border: none; border-radius: var(--radius-sm); padding: 0.75rem 1rem; font-weight: 600; cursor: pointer; transition: transform 0.1s; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger-light); color: var(--danger); }
        .btn-ghost { background: transparent; color: var(--text-muted); }
        .btn-float { 
            position: fixed; bottom: 90px; right: 20px; 
            width: 56px; height: 56px; border-radius: 50%; 
            background: var(--primary); color: white; 
            font-size: 1.5rem; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); z-index: 30;
            border: none; cursor: pointer;
        }

        /* Forms */
        .form-group { margin-bottom: 1rem; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 0.25rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .form-input { width: 100%; padding: 0.75rem; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 1rem; background: var(--bg); outline: none; }
        .form-input:focus { border-color: var(--primary); ring: 2px solid var(--primary-light); }
        .form-input-lg { font-size: 2rem; font-weight: 700; text-align: center; border: none; border-bottom: 2px solid var(--border); border-radius: 0; background: transparent; padding: 0.5rem 0; }
        .form-input-lg:focus { border-color: var(--primary); }

        /* Lists */
        .list-item { display: flex; align-items: center; justify-content: space-between; padding: 1rem; background: white; border-radius: var(--radius); margin-bottom: 0.75rem; border: 1px solid var(--border); }
        .icon-box { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; margin-right: 1rem; }
        
        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.2s; }
        .modal-overlay.open { display: flex; opacity: 1; }
        .modal-content { background: white; width: 100%; max-width: 480px; border-radius: 2rem 2rem 0 0; padding: 1.5rem; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); max-height: 90vh; overflow-y: auto; }
        .modal-overlay.open .modal-content { transform: translateY(0); }

        /* Pin Lock */
        #pin-lock { position: fixed; inset: 0; background: var(--primary); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; transition: transform 0.3s; }
        #pin-lock.hidden { transform: translateY(-100%); pointer-events: none; }
        .pin-dots { display: flex; gap: 1rem; margin: 2rem 0; }
        .pin-dot { width: 16px; height: 16px; border-radius: 50%; background: rgba(255,255,255,0.3); transition: background 0.2s; }
        .pin-dot.filled { background: white; }
        .pin-dot.error { background: var(--danger); }
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; width: 280px; }
        .num-btn { width: 70px; height: 70px; border-radius: 50%; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 1.5rem; font-weight: 600; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; }
        .num-btn:active { background: rgba(255,255,255,0.3); }

        /* Progress Bar */
        .progress-bg { width: 100%; height: 8px; background: var(--bg); border-radius: 99px; overflow: hidden; margin-top: 0.5rem; }
        .progress-fill { height: 100%; background: var(--info); border-radius: 99px; transition: width 0.5s ease; }

        /* Category Selector */
        .cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; }
        .cat-btn { display: flex; flex-direction: column; align-items: center; padding: 0.5rem; border: 2px solid transparent; border-radius: var(--radius-sm); background: var(--bg); cursor: pointer; }
        .cat-btn.selected { border-color: var(--primary); background: var(--primary-light); }
        .cat-icon { font-size: 1.25rem; margin-bottom: 0.25rem; }
        .cat-name { font-size: 0.6rem; text-transform: uppercase; font-weight: 700; color: var(--text-muted); }

        /* Chart */
        .chart-container { position: relative; width: 200px; height: 200px; margin: 0 auto; border-radius: 50%; background: conic-gradient(var(--border) 0% 100%); }
        .chart-center { position: absolute; inset: 40px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    </style>
</head>
<body>
    <!-- SVG SPRITES REMOVED -->

    <!-- PIN LOCK SCREEN -->
    <div id="pin-lock" class="hidden">
        <div style="margin-bottom: 2rem; text-align: center;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">
                <span class="icon icon-3xl">🔒</span>
            </div>
            <h1 style="font-size: 1.5rem;">MesadaControl</h1>
            <p style="opacity: 0.8;">Digite seu PIN</p>
        </div>
        <div class="pin-dots" id="pin-dots">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="numpad" id="numpad">
            <!-- Generated by JS -->
        </div>
    </div>

    <!-- APP CONTAINER -->
    <div id="app">
        <!-- Main Content (Dynamic) -->
        <div id="main-content" class="p-4">
            <!-- Views injected here -->
        </div>

        <!-- Navigation -->
        <nav class="nav-bar">
            <button class="nav-item active" onclick="router.navigate('dashboard')">
                <span class="nav-icon">
                    <span class="icon">🏠</span>
                </span>
                <span>Início</span>
            </button>
            <button class="nav-item" onclick="router.navigate('transactions')">
                <span class="nav-icon">
                    <span class="icon">📄</span>
                </span>
                <span>Extrato</span>
            </button>
            <button class="nav-item" onclick="router.navigate('goals')">
                <span class="nav-icon">
                    <span class="icon">🎯</span>
                </span>
                <span>Metas</span>
            </button>
            <button class="nav-item" onclick="router.navigate('reports')">
                <span class="nav-icon">
                    <span class="icon">📊</span>
                </span>
                <span>Relat.</span>
            </button>
            <button class="nav-item" onclick="router.navigate('settings')">
                <span class="nav-icon">
                    <span class="icon">⚙️</span>
                </span>
                <span>Ajustes</span>
            </button>
        </nav>

        <!-- Floating Add Button -->
        <button id="fab" class="btn-float" onclick="modal.open()">
            <span class="icon icon-lg">➕</span>
        </button>
    </div>

    <!-- ADD TRANSACTION MODAL -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Nova Transação</h2>
                <button onclick="modal.close()" class="btn btn-ghost" style="padding: 0.5rem;">
                    <span class="icon">❌</span>
                </button>
            </div>

            <div class="flex gap-2 mb-6" style="background: var(--bg); padding: 4px; border-radius: 12px;">
                <button onclick="txForm.setType('expense')" id="btn-type-expense" class="btn w-full" style="background: white; color: var(--danger); box-shadow: var(--shadow);">Despesa</button>
                <button onclick="txForm.setType('income')" id="btn-type-income" class="btn w-full btn-ghost">Receita</button>
                <button onclick="txForm.setType('savings')" id="btn-type-savings" class="btn w-full btn-ghost">Poupança</button>
            </div>

            <form id="tx-form" onsubmit="txForm.submit(event)">
                <div class="form-group">
                    <label class="form-label">Valor (MZN)</label>
                    <input type="number" id="tx-amount" class="form-input-lg" placeholder="0" required inputmode="numeric">
                </div>

                <div class="form-group">
                    <label class="form-label">Categoria</label>
                    <div class="cat-grid" id="cat-grid">
                        <!-- Generated by JS -->
                    </div>
                    <input type="hidden" id="tx-category" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Data</label>
                    <input type="date" id="tx-date" class="form-input" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Descrição (Opcional)</label>
                    <input type="text" id="tx-desc" class="form-input" placeholder="Ex: Lanche">
                </div>

                <button type="submit" class="btn btn-primary w-full" style="padding: 1rem; font-size: 1.1rem;">Salvar</button>
            </form>
        </div>
    </div>

    <!-- ADD GOAL MODAL -->
    <div id="goal-modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">Nova Meta</h2>
                <button onclick="goalModal.close()" class="btn btn-ghost" style="padding: 0.5rem;">
                    <span class="icon">❌</span>
                </button>
            </div>

            <form id="goal-form" onsubmit="goalModal.submit(event)">
                <div class="form-group">
                    <label class="form-label">Nome da Meta</label>
                    <input type="text" id="goal-name" class="form-input" placeholder="Ex: Celular Novo" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Valor Alvo (MZN)</label>
                    <input type="number" id="goal-target" class="form-input" placeholder="0" required inputmode="numeric">
                </div>

                <div class="form-group">
                    <label class="form-label">Ícone</label>
                    <div class="cat-grid" id="goal-icons-grid">
                        <!-- Generated by JS -->
                    </div>
                    <input type="hidden" id="goal-icon" value="🎯">
                </div>

                <button type="submit" class="btn btn-primary w-full" style="padding: 1rem; font-size: 1.1rem;">Criar Meta</button>
            </form>
        </div>
    </div>

    <script>
        /**
         * APP LOGIC
         */

        // --- CONSTANTS & DATA ---
        const CATEGORIES = [
            { id: 'food', name: 'Alimentação', icon: '🍔', type: 'expense', color: '#fcd34d' },
            { id: 'transport', name: 'Transporte', icon: '🚕', type: 'expense', color: '#93c5fd' },
            { id: 'education', name: 'Escola', icon: '🎓', type: 'expense', color: '#fca5a5' },
            { id: 'internet', name: 'Internet', icon: '📡', type: 'expense', color: '#c4b5fd' },
            { id: 'leisure', name: 'Lazer', icon: '🎮', type: 'expense', color: '#f9a8d4' },
            { id: 'extras', name: 'Extras', icon: '💳', type: 'expense', color: '#e2e8f0' },
            { id: 'allowance', name: 'Mesada', icon: '💵', type: 'income', color: '#6ee7b7' },
            { id: 'savings', name: 'Poupança', icon: '🐷', type: 'savings', color: '#818cf8' },
        ];

        const GOAL_ICONS = [
            '📱', '💻', '🚲', '🎯', 
            '✈️', '🎮', '🎓', '👕'
        ];

        // --- STORE (LOCAL STORAGE) ---
        const Store = {
            getTransactions: () => JSON.parse(localStorage.getItem('mc_transactions') || '[]'),
            setTransactions: (data) => localStorage.setItem('mc_transactions', JSON.stringify(data)),
            
            getGoals: () => {
                const goals = JSON.parse(localStorage.getItem('mc_goals') || '[]');
                const map = {
                    'icon-mobile': '📱', 'icon-laptop': '💻', 'icon-bike': '🚲', 'icon-target': '🎯',
                    'icon-plane': '✈️', 'icon-game': '🎮', 'icon-grad': '🎓', 'icon-shirt': '👕', 'fa-bullseye': '🎯'
                };
                return goals.map(g => ({ ...g, icon: map[g.icon] || g.icon }));
            },
            setGoals: (data) => localStorage.setItem('mc_goals', JSON.stringify(data)),
            
            getSettings: () => JSON.parse(localStorage.getItem('mc_settings') || JSON.stringify({
                allowance: 0,
                day: 1,
                pin: null
            })),
            setSettings: (data) => localStorage.setItem('mc_settings', JSON.stringify(data)),
        };

        // --- UTILS ---
        const Utils = {
            formatCurrency: (val) => new Intl.NumberFormat('pt-MZ', { style: 'currency', currency: 'MZN', minimumFractionDigits: 0 }).format(val),
            generateId: () => Date.now().toString(36) + Math.random().toString(36).substr(2),
            getDaysUntil: (day) => {
                const today = new Date();
                let target = new Date(today.getFullYear(), today.getMonth(), day);
                if (today.getDate() >= day) target.setMonth(target.getMonth() + 1);
                return Math.ceil((target - today) / (1000 * 60 * 60 * 24));
            },
            getCurrentMonthTransactions: (txs, day) => {
                const today = new Date();
                let start = new Date(today.getFullYear(), today.getMonth(), day);
                if (today.getDate() < day) start.setMonth(start.getMonth() - 1);
                let end = new Date(start);
                end.setMonth(end.getMonth() + 1);
                return txs.filter(t => {
                    const d = new Date(t.date);
                    return d >= start && d < end;
                });
            }
        };

        // --- STATE MANAGEMENT ---
        let state = {
            transactions: Store.getTransactions(),
            goals: Store.getGoals(),
            settings: Store.getSettings(),
            view: 'dashboard',
            modalType: 'expense'
        };

        window.Actions = {
            addTransaction: (tx) => {
                state.transactions.unshift({ ...tx, id: Utils.generateId() });
                Store.setTransactions(state.transactions);
                render();
                modal.close();
            },
            deleteTransaction: (id) => {
                if(!confirm('Apagar transação?')) return;
                state.transactions = state.transactions.filter(t => t.id !== id);
                Store.setTransactions(state.transactions);
                render();
            },
            addGoal: (goal) => {
                state.goals.push({ ...goal, id: Utils.generateId(), current: 0 });
                Store.setGoals(state.goals);
                render();
                goalModal.close();
            },
            updateGoal: (id, amount) => {
                const g = state.goals.find(g => g.id === id);
                if (g) {
                    g.current = amount;
                    Store.setGoals(state.goals);
                    render();
                }
            },
            depositGoal: (id) => {
                const amountStr = prompt('Quanto você quer guardar?');
                if (amountStr === null) return; // User cancelled
                const amount = parseFloat(amountStr);
                if (isNaN(amount) || amount <= 0) return alert('Valor inválido');
                
                const g = state.goals.find(g => g.id === id);
                if (g) {
                    g.current += amount;
                    Store.setGoals(state.goals);
                    render();
                }
            },
            deleteGoal: (id) => {
                if(confirm('Tem certeza que deseja apagar esta meta?')) {
                    state.goals = state.goals.filter(g => g.id !== id);
                    Store.setGoals(state.goals);
                    render();
                }
            },
            saveSettings: (s) => {
                state.settings = s;
                Store.setSettings(s);
                alert('Configurações salvas!');
                render();
            },
            resetData: () => {
                if(confirm('ATENÇÃO: Isso apagará todos os dados!')) {
                    localStorage.clear();
                    location.reload();
                }
            }
        };

        // --- VIEWS ---
        const Views = {
            dashboard: () => {
                const currentTxs = Utils.getCurrentMonthTransactions(state.transactions, state.settings.day);
                const spent = currentTxs.filter(t => t.type === 'expense').reduce((a, b) => a + b.amount, 0);
                const saved = currentTxs.filter(t => t.type === 'savings').reduce((a, b) => a + b.amount, 0);
                const balance = state.settings.allowance - spent - saved;
                const daysLeft = Utils.getDaysUntil(state.settings.day);
                const weekly = state.settings.allowance / 4;
                
                // Spending alert
                const dailyBudget = state.settings.allowance / 30;
                // Rough estimate of days passed in cycle
                const daysPassed = 30 - daysLeft;
                const isOver = (spent / (daysPassed || 1)) > dailyBudget;

                return `
                    <div class="balance-card mb-6">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-sm opacity-80">Saldo Disponível</p>
                                <h1 class="text-3xl font-bold mt-1">${Utils.formatCurrency(balance)}</h1>
                            </div>
                            <div class="bg-white/20 p-2 rounded-lg text-center">
                                <span class="block text-xs font-bold">${daysLeft}d</span>
                                <span class="text-[10px]">restantes</span>
                            </div>
                        </div>
                        <div class="balance-stats">
                            <div class="stat-box">
                                <p class="text-[10px] opacity-80">Mesada</p>
                                <p class="font-bold text-sm">${Utils.formatCurrency(state.settings.allowance)}</p>
                            </div>
                            <div class="stat-box">
                                <p class="text-[10px] opacity-80">Gasto</p>
                                <p class="font-bold text-sm">${Utils.formatCurrency(spent)}</p>
                            </div>
                            <div class="stat-box">
                                <p class="text-[10px] opacity-80">Semana</p>
                                <p class="font-bold text-sm">${Utils.formatCurrency(weekly)}</p>
                            </div>
                        </div>
                    </div>

                    ${state.settings.allowance > 0 ? `
                    <div class="card mb-6 flex items-center gap-4" style="background: ${isOver ? '#fff7ed' : '#ecfdf5'}; border-color: ${isOver ? '#fed7aa' : '#a7f3d0'}">
                        <div style="font-size: 1.5rem; color: ${isOver ? 'var(--warning)' : 'var(--success)'}">
                            <span class="icon icon-lg">${isOver ? '⚠️' : '✅'}</span>
                        </div>
                        <div>
                            <p class="font-bold text-sm ${isOver ? 'text-warning' : 'text-success'}">${isOver ? 'Atenção aos gastos!' : 'Dentro do orçamento'}</p>
                            <p class="text-xs text-muted">${isOver ? 'Você está gastando rápido demais.' : 'Continue assim!'}</p>
                        </div>
                    </div>` : ''}

                    <h3 class="font-bold mb-4 text-sm text-muted uppercase">Últimas Transações</h3>
                    ${currentTxs.slice(0, 5).map(t => {
                        const cat = CATEGORIES.find(c => c.id === t.categoryId) || {};
                        const isExp = t.type === 'expense';
                        return `
                        <div class="list-item">
                            <div class="flex items-center">
                                <div class="icon-box" style="background: ${cat.color}20; color: ${cat.color}">
                                    <span class="icon">${cat.icon || '🎯'}</span>
                                </div>
                                <div>
                                    <p class="font-bold text-sm">${t.description || cat.name}</p>
                                    <p class="text-xs text-muted">${new Date(t.date).toLocaleDateString('pt-MZ')}</p>
                                </div>
                            </div>
                            <span class="font-bold ${isExp ? 'text-danger' : 'text-success'}">
                                ${isExp ? '-' : '+'}${Utils.formatCurrency(t.amount)}
                            </span>
                        </div>
                        `;
                    }).join('') || '<p class="text-center text-muted text-sm py-4">Sem transações recentes.</p>'}
                `;
            },

            transactions: () => {
                // Group by date
                const groups = state.transactions.reduce((acc, t) => {
                    acc[t.date] = acc[t.date] || [];
                    acc[t.date].push(t);
                    return acc;
                }, {});
                
                const sortedDates = Object.keys(groups).sort((a,b) => new Date(b) - new Date(a));

                return `
                    <h2 class="text-2xl font-bold mb-6">Extrato</h2>
                    ${sortedDates.map(date => `
                        <h3 class="text-xs font-bold text-muted uppercase mb-2 mt-4">${new Date(date).toLocaleDateString('pt-MZ', {weekday:'long', day:'numeric', month:'long'})}</h3>
                        ${groups[date].map(t => {
                            const cat = CATEGORIES.find(c => c.id === t.categoryId) || {};
                            const isExp = t.type === 'expense';
                            return `
                            <div class="list-item">
                                <div class="flex items-center">
                                    <div class="icon-box" style="background: ${cat.color}20; color: ${cat.color}">
                                        <span class="icon">${cat.icon || '🎯'}</span>
                                    </div>
                                    <div>
                                        <p class="font-bold text-sm">${t.description || cat.name}</p>
                                        <p class="text-xs text-muted">${cat.name}</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-4">
                                    <span class="font-bold ${isExp ? 'text-danger' : t.type === 'income' ? 'text-success' : 'text-info'}">
                                        ${isExp ? '-' : '+'}${Utils.formatCurrency(t.amount)}
                                    </span>
                                    <button onclick="Actions.deleteTransaction('${t.id}')" class="text-muted" style="background:none; border:none; padding: 8px;">
                                        <span class="icon">🗑️</span>
                                    </button>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    `).join('') || '<div class="text-center py-10 text-muted">Nenhuma transação encontrada.</div>'}
                `;
            },

            goals: () => {
                return `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold">Metas</h2>
                        <button onclick="goalModal.open()" class="btn btn-primary text-xs">
                            <span class="icon" style="margin-right:4px">➕</span> Nova Meta
                        </button>
                    </div>
                    ${state.goals.map(g => {
                        const pct = Math.min(100, (g.current / g.targetAmount) * 100);
                        return `
                        <div class="card mb-4">
                            <div class="flex justify-between items-start mb-2">
                                <div class="flex items-center gap-2">
                                    <span class="text-2xl text-info">
                                        <span class="icon icon-lg">${g.icon}</span>
                                    </span>
                                    <div>
                                        <h3 class="font-bold">${g.name}</h3>
                                        <p class="text-xs text-muted">Meta: ${Utils.formatCurrency(g.targetAmount)}</p>
                                    </div>
                                </div>
                                <button onclick="event.stopPropagation(); Actions.deleteGoal('${g.id}')" class="text-muted" style="background:none; border:none; padding: 8px;">
                                    <span class="icon">❌</span>
                                </button>
                            </div>
                            <div class="flex justify-between items-end mb-1">
                                <span class="text-xl font-bold text-info">${Utils.formatCurrency(g.current)}</span>
                                <span class="text-xs font-bold text-muted">${Math.round(pct)}%</span>
                            </div>
                            <div class="progress-bg">
                                <div class="progress-fill" style="width: ${pct}%"></div>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="Actions.depositGoal('${g.id}')" class="btn btn-ghost w-full text-xs" style="background: var(--info-light); color: var(--info)">Depositar</button>
                            </div>
                        </div>
                        `;
                    }).join('') || '<div class="text-center py-10 text-muted">Sem metas definidas.</div>'}
                `;
            },

            reports: () => {
                const currentTxs = Utils.getCurrentMonthTransactions(state.transactions, state.settings.day);
                const expenses = currentTxs.filter(t => t.type === 'expense');
                const totalExp = expenses.reduce((a,b) => a + b.amount, 0);
                
                // Group by category for chart
                const catTotals = expenses.reduce((acc, t) => {
                    acc[t.categoryId] = (acc[t.categoryId] || 0) + t.amount;
                    return acc;
                }, {});

                // Generate Conic Gradient
                let gradient = [];
                let currentDeg = 0;
                Object.entries(catTotals).forEach(([catId, amount]) => {
                    const cat = CATEGORIES.find(c => c.id === catId) || {color: '#ccc'};
                    const deg = (amount / totalExp) * 360;
                    gradient.push(`${cat.color} ${currentDeg}deg ${currentDeg + deg}deg`);
                    currentDeg += deg;
                });
                const gradientStr = gradient.length ? gradient.join(', ') : '#e2e8f0 0deg 360deg';

                return `
                    <h2 class="text-2xl font-bold mb-6">Relatórios</h2>
                    
                    <div class="card mb-6">
                        <h3 class="font-bold mb-4 text-center">Gastos por Categoria</h3>
                        <div class="chart-container" style="background: conic-gradient(${gradientStr})">
                            <div class="chart-center">
                                <span class="text-xs text-muted">Total</span>
                                <span class="font-bold">${Utils.formatCurrency(totalExp)}</span>
                            </div>
                        </div>
                        <div class="mt-6 grid grid-cols-2 gap-2">
                            ${Object.entries(catTotals).map(([catId, amount]) => {
                                const cat = CATEGORIES.find(c => c.id === catId) || {name:'Outros', color:'#ccc'};
                                const pct = Math.round((amount / totalExp) * 100);
                                return `
                                <div class="flex items-center gap-2 text-xs">
                                    <div style="width:10px; height:10px; background:${cat.color}; border-radius:50%;"></div>
                                    <span class="flex-1">${cat.name}</span>
                                    <span class="font-bold">${pct}%</span>
                                </div>
                                `;
                            }).join('')}
                        </div>
                    </div>

                    <div class="card">
                        <h3 class="font-bold mb-2">Regra 60/30/10</h3>
                        <p class="text-xs text-muted mb-4">Análise ideal de gastos</p>
                        
                        <div class="mb-3">
                            <div class="flex justify-between text-xs mb-1">
                                <span>Necessidades (60%)</span>
                                <span>${Utils.formatCurrency(totalExp * 0.6)}</span>
                            </div>
                            <div class="progress-bg"><div class="progress-fill" style="width: 60%; background: var(--success); opacity: 0.5;"></div></div>
                        </div>
                        <div class="mb-3">
                            <div class="flex justify-between text-xs mb-1">
                                <span>Lazer (30%)</span>
                                <span>${Utils.formatCurrency(totalExp * 0.3)}</span>
                            </div>
                            <div class="progress-bg"><div class="progress-fill" style="width: 30%; background: #a855f7; opacity: 0.5;"></div></div>
                        </div>
                        <div>
                            <div class="flex justify-between text-xs mb-1">
                                <span>Poupança (10%)</span>
                                <span>${Utils.formatCurrency(totalExp * 0.1)}</span>
                            </div>
                            <div class="progress-bg"><div class="progress-fill" style="width: 10%; background: var(--info); opacity: 0.5;"></div></div>
                        </div>
                    </div>
                `;
            },

            settings: () => {
                return `
                    <h2 class="text-2xl font-bold mb-6">Configurações</h2>
                    
                    <div class="card mb-6">
                        <h3 class="font-bold mb-4 text-primary flex items-center gap-2">
                            <span class="icon">💵</span>
                            Mesada
                        </h3>
                        <div class="form-group">
                            <label class="form-label">Valor Mensal (MZN)</label>
                            <input type="number" id="set-allowance" class="form-input" value="${state.settings.allowance}">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Dia do Recebimento</label>
                            <select id="set-day" class="form-input">
                                ${Array.from({length:31}, (_,i) => `<option value="${i+1}" ${state.settings.day == i+1 ? 'selected' : ''}>Dia ${i+1}</option>`).join('')}
                            </select>
                        </div>
                    </div>

                    <div class="card mb-6">
                        <h3 class="font-bold mb-4 text-info flex items-center gap-2">
                            <span class="icon">🔒</span>
                            Segurança
                        </h3>
                        <div class="form-group">
                            <label class="form-label">PIN de Acesso (4 dígitos)</label>
                            <input type="password" id="set-pin" class="form-input" value="${state.settings.pin || ''}" maxlength="4" placeholder="Sem PIN" inputmode="numeric">
                        </div>
                    </div>

                    <button onclick="saveSettingsUI()" class="btn btn-primary w-full mb-4">Salvar Alterações</button>
                    <button onclick="Actions.resetData()" class="btn btn-danger w-full">Resetar Tudo</button>
                `;
            }
        };

        // --- RENDERER ---
        function render() {
            // Render View
            const content = document.getElementById('main-content');
            content.innerHTML = Views[state.view]();

            // Update Nav
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.nav-item[onclick*="${state.view}"]`)?.classList.add('active');

            // Show/Hide FAB
            document.getElementById('fab').style.display = state.view === 'dashboard' || state.view === 'transactions' ? 'flex' : 'none';
        }

        // --- ROUTER ---
        window.router = {
            navigate: (view) => {
                state.view = view;
                render();
            }
        };

        // --- MODAL LOGIC ---
        window.modal = {
            open: () => {
                document.getElementById('modal-overlay').classList.add('open');
                document.getElementById('tx-date').valueAsDate = new Date();
                txForm.setType('expense');
            },
            close: () => {
                document.getElementById('modal-overlay').classList.remove('open');
            }
        };

        window.txForm = {
            setType: (type) => {
                state.modalType = type;
                // Update UI buttons
                ['expense', 'income', 'savings'].forEach(t => {
                    const btn = document.getElementById(`btn-type-${t}`);
                    if (t === type) {
                        btn.style.background = 'white';
                        btn.style.boxShadow = 'var(--shadow)';
                        btn.style.color = type === 'expense' ? 'var(--danger)' : type === 'income' ? 'var(--success)' : 'var(--info)';
                    } else {
                        btn.style.background = 'transparent';
                        btn.style.boxShadow = 'none';
                        btn.style.color = 'var(--text-muted)';
                    }
                });
                
                // Render Categories
                const cats = CATEGORIES.filter(c => c.type === type);
                const grid = document.getElementById('cat-grid');
                grid.innerHTML = cats.map(c => `
                    <div class="cat-btn" onclick="txForm.selectCat('${c.id}', this)">
                        <span class="cat-icon">
                            <span class="icon icon-lg">${c.icon}</span>
                        </span>
                        <span class="cat-name">${c.name}</span>
                    </div>
                `).join('');
                
                // Select first category by default
                if (cats.length > 0) {
                    txForm.selectCat(cats[0].id, grid.firstElementChild);
                }
            },
            selectCat: (id, el) => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
                el.classList.add('selected');
                document.getElementById('tx-category').value = id;
            },
            submit: (e) => {
                e.preventDefault();
                const amount = parseFloat(document.getElementById('tx-amount').value);
                const categoryId = document.getElementById('tx-category').value;
                const date = document.getElementById('tx-date').value;
                const desc = document.getElementById('tx-desc').value;

                if (!amount || !categoryId) return alert('Preencha valor e categoria');

                Actions.addTransaction({
                    amount, categoryId, date, description: desc, type: state.modalType
                });
            }
        };

        // --- GOAL MODAL LOGIC ---
        window.goalModal = {
            open: () => {
                document.getElementById('goal-modal-overlay').classList.add('open');
                // Render icons
                const grid = document.getElementById('goal-icons-grid');
                grid.innerHTML = GOAL_ICONS.map((icon, i) => `
                    <div class="cat-btn ${i===0?'selected':''}" onclick="goalModal.selectIcon('${icon}', this)">
                        <span class="cat-icon">
                            <span class="icon icon-lg">${icon}</span>
                        </span>
                    </div>
                `).join('');
                document.getElementById('goal-icon').value = GOAL_ICONS[0];
            },
            close: () => {
                document.getElementById('goal-modal-overlay').classList.remove('open');
            },
            selectIcon: (icon, el) => {
                document.querySelectorAll('#goal-icons-grid .cat-btn').forEach(b => b.classList.remove('selected'));
                el.classList.add('selected');
                document.getElementById('goal-icon').value = icon;
            },
            submit: (e) => {
                e.preventDefault();
                const name = document.getElementById('goal-name').value;
                const target = parseFloat(document.getElementById('goal-target').value);
                const icon = document.getElementById('goal-icon').value;

                if(!name || !target) return;
                Actions.addGoal({ name, targetAmount: target, icon });
            }
        };

        function saveSettingsUI() {
            const allowance = parseFloat(document.getElementById('set-allowance').value) || 0;
            const day = parseInt(document.getElementById('set-day').value);
            const pin = document.getElementById('set-pin').value;
            Actions.saveSettings({ allowance, day, pin: pin.length === 4 ? pin : null });
        }

        // --- PIN LOGIC ---
        window.PinSystem = {
            input: '',
            init: () => {
                if (state.settings.pin) {
                    document.getElementById('pin-lock').classList.remove('hidden');
                    PinSystem.renderPad();
                }
            },
            renderPad: () => {
                const pad = document.getElementById('numpad');
                pad.innerHTML = [1,2,3,4,5,6,7,8,9,0].map(n => 
                    `<button class="num-btn" onclick="PinSystem.press(${n})" style="${n===0?'grid-column:2':''}">${n}</button>`
                ).join('');
            },
            press: (n) => {
                if (PinSystem.input.length < 4) {
                    PinSystem.input += n;
                    PinSystem.updateDots();
                    if (PinSystem.input.length === 4) {
                        setTimeout(PinSystem.check, 200);
                    }
                }
            },
            updateDots: () => {
                const dots = document.querySelectorAll('.pin-dot');
                dots.forEach((d, i) => {
                    d.classList.toggle('filled', i < PinSystem.input.length);
                    d.classList.remove('error');
                });
            },
            check: () => {
                if (PinSystem.input === state.settings.pin) {
                    document.getElementById('pin-lock').classList.add('hidden');
                } else {
                    document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
                    PinSystem.input = '';
                    setTimeout(PinSystem.updateDots, 500);
                }
            }
        };

        // --- INIT ---
        window.onload = () => {
            render();
            PinSystem.init();
        };

    </script>
</body>
</html>
